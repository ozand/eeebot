{% extends 'base.html' %}
{% block content %}
<h2>Promotions</h2>
<table>
  <tr><th>Collected</th><th>Title</th><th>Status</th><th>Detail</th></tr>
  {% for row in promotions %}
  <tr>
    <td>{{ row['collected_at'] }}</td>
    <td>{{ row['title'] }}</td>
    <td>{{ row['status'] }}</td>
    <td><code>{{ row['detail_json'] }}</code></td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
